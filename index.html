<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>김태헌 · 웹 명함</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>

  <main class="card" id="card">
    <div class="card-inner">
      <header class="card-header">
        <div class="avatar-wrap">
          <svg class="avatar" viewBox="0 0 200 200" aria-label="김태헌 캐릭터">
            <defs>
              <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#1e1b4b"/>
                <stop offset="100%" stop-color="#0f172a"/>
              </linearGradient>
              <linearGradient id="suitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#334155"/>
                <stop offset="100%" stop-color="#1e293b"/>
              </linearGradient>
              <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#1a1a2e"/>
                <stop offset="50%" stop-color="#2d2d44"/>
                <stop offset="100%" stop-color="#0f0f1a"/>
              </linearGradient>
              <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#6366f1"/>
                <stop offset="100%" stop-color="#06b6d4"/>
              </linearGradient>
              <radialGradient id="faceGrad" cx="40%" cy="35%" r="65%">
                <stop offset="0%" stop-color="#FDDCBF"/>
                <stop offset="100%" stop-color="#E8B896"/>
              </radialGradient>
              <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="3" result="blur"/>
                <feMerge>
                  <feMergeNode in="blur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>
            </defs>

            <!-- 배경 -->
            <circle cx="100" cy="100" r="92" fill="url(#bgGrad)" stroke="url(#glowGrad)" stroke-width="2.5"/>

            <!-- AI 오라 -->
            <circle class="ai-aura" cx="100" cy="95" r="78" fill="none" stroke="url(#glowGrad)" stroke-width="1" opacity="0.25"/>

            <!-- 어깨·수트 -->
            <path d="M30 200 L30 155 Q55 138 100 142 Q145 138 170 155 L170 200 Z" fill="url(#suitGrad)"/>
            <path d="M72 142 L100 168 L128 142" fill="#475569"/>
            <path d="M88 142 L100 155 L112 142" fill="#f8fafc"/>
            <path d="M96 142 L100 162 L104 142" fill="#6366f1" opacity="0.9"/>

            <!-- 목 -->
            <rect x="86" y="128" width="28" height="22" rx="6" fill="#E8B896"/>

            <!-- 얼굴 -->
            <ellipse cx="100" cy="98" rx="48" ry="52" fill="url(#faceGrad)"/>

            <!-- 귀 -->
            <ellipse cx="54" cy="100" rx="8" ry="12" fill="#E0AD88"/>
            <ellipse cx="146" cy="100" rx="8" ry="12" fill="#E0AD88"/>

            <!-- 머리카락 (뒤) -->
            <path d="M52 72 Q100 20 148 72 Q155 90 148 108 Q100 88 52 108 Q45 90 52 72" fill="url(#hairGrad)"/>

            <!-- 머리카락 (앞·슬릭) -->
            <path d="M54 68 Q72 42 100 38 Q128 42 146 68 Q138 52 100 46 Q62 52 54 68" fill="#2d2d44"/>
            <path d="M60 58 Q85 44 100 46 Q115 44 140 58" fill="none" stroke="#4a4a6a" stroke-width="1.5" opacity="0.6"/>

            <!-- 눈썹 -->
            <path d="M72 88 Q82 84 90 88" fill="none" stroke="#2d2d44" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M110 88 Q118 84 128 88" fill="none" stroke="#2d2d44" stroke-width="2.5" stroke-linecap="round"/>

            <!-- 눈 -->
            <ellipse class="eye eye-left" cx="82" cy="98" rx="8" ry="9" fill="#fff"/>
            <ellipse class="eye eye-right" cx="118" cy="98" rx="8" ry="9" fill="#fff"/>
            <circle class="pupil pupil-left" cx="83" cy="99" r="4.5" fill="#0f172a"/>
            <circle class="pupil pupil-right" cx="119" cy="99" r="4.5" fill="#0f172a"/>
            <circle class="pupil-highlight" cx="84.5" cy="97" r="1.5" fill="#fff"/>
            <circle class="pupil-highlight" cx="120.5" cy="97" r="1.5" fill="#fff"/>
            <circle cx="81" cy="100" r="1" fill="#6366f1" opacity="0.5"/>
            <circle cx="117" cy="100" r="1" fill="#6366f1" opacity="0.5"/>

            <!-- 볼 하이라이트 -->
            <ellipse cx="68" cy="108" rx="8" ry="5" fill="#F5A89A" opacity="0.2"/>
            <ellipse cx="132" cy="108" rx="8" ry="5" fill="#F5A89A" opacity="0.2"/>

            <!-- 코 -->
            <path d="M100 104 L98 112 L102 112 Z" fill="#D4956A" opacity="0.7"/>

            <!-- 입 (자신감 있는 미소) -->
            <path class="mouth" d="M88 118 Q100 126 112 118" fill="none" stroke="#B8705A" stroke-width="2" stroke-linecap="round"/>

            <!-- AI 오브 -->
            <g class="ai-orb" filter="url(#glow)">
              <circle cx="158" cy="52" r="14" fill="#6366f1" opacity="0.3"/>
              <circle cx="158" cy="52" r="8" fill="#06b6d4" opacity="0.8"/>
              <circle cx="156" cy="50" r="2.5" fill="#fff"/>
              <line x1="148" y1="58" x2="138" y2="72" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
              <line x1="152" y1="60" x2="145" y2="78" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
            </g>

            <!-- 수트 라펠 -->
            <path d="M72 142 L82 168 L100 155 L100 142 Z" fill="#475569"/>
            <path d="M128 142 L118 168 L100 155 L100 142 Z" fill="#475569"/>
          </svg>
          <span class="avatar-ring"></span>
        </div>

        <div class="intro-text">
          <p class="badge">SideOnAI</p>
          <h1 class="name">김태헌</h1>
          <p class="role">SideOnAI 대표</p>
          <p class="tagline">AI와 함께 놀고 있습니다. 같이 노실 분?</p>
        </div>
      </header>

      <section class="contact">
        <a class="contact-item" href="mailto:th@sideonai.com" id="email-link">
          <span class="contact-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="M2 7l10 7 10-7"/>
            </svg>
          </span>
          <span class="contact-label">이메일</span>
          <span class="contact-value">th@sideonai.com</span>
        </a>

        <a class="contact-item" href="tel:01011111111" id="phone-link">
          <span class="contact-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
            </svg>
          </span>
          <span class="contact-label">연락처</span>
          <span class="contact-value">010-1111-1111</span>
        </a>
      </section>

      <footer class="card-footer">
        <div class="footer-actions">
          <button type="button" class="btn-copy" id="copy-btn" aria-label="연락처 복사">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
            연락처 복사
          </button>

          <a class="btn-linkedin" href="https://www.linkedin.com/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn 프로필">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
            LinkedIn
          </a>

          <a class="btn-youtube" href="https://www.youtube.com/@ai-study" target="_blank" rel="noopener noreferrer" aria-label="YouTube 채널">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
            </svg>
            YouTube
          </a>
        </div>
        <p class="toast" id="toast" role="status" aria-live="polite"></p>
      </footer>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
